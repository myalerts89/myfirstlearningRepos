# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- none

pool:
  vmImage: ubuntu-latest

steps:
- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.14.8' 

- task: TerraformTask@5
  displayName: init
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendAzureRmUseEntraIdForAuthentication: false
    backendServiceArm: 'Azure-Service-connection'
    backendAzureRmResourceGroupName: 'terrafor-resource-group'
    backendAzureRmStorageAccountName: 'terraformcloudtfstate'
    backendAzureRmContainerName: 'terraform'
    backendAzureRmKey: 'prod.terraform.tfstate'

- task: TerraformTask@5
  displayName: planphase
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
    commandOptions: 'ls -l'
    environmentServiceNameAzureRM: 'Azure-Service-connection'
    environmentAzureRmOverrideSubscriptionID: '7b4fa607-b447-4f15-99df-721b7b10c661'